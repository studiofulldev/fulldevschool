<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <rect width="1200" height="1200" fill="#f4efe6"/>
  <rect x="60" y="60" width="1080" height="1080" rx="28" fill="#fffaf2" stroke="#1f2937" stroke-width="8"/>
  <text x="600" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="54" font-weight="700" fill="#111827">Quando voce abre 37 abas para estudar</text>
  <text x="600" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#374151">e no fim esquece qual era a aba importante</text>
  <rect x="150" y="300" width="900" height="500" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="6"/>
  <rect x="190" y="340" width="160" height="50" rx="10" fill="#fca5a5"/>
  <rect x="360" y="340" width="160" height="50" rx="10" fill="#fde68a"/>
  <rect x="530" y="340" width="160" height="50" rx="10" fill="#86efac"/>
  <rect x="700" y="340" width="160" height="50" rx="10" fill="#93c5fd"/>
  <rect x="870" y="340" width="140" height="50" rx="10" fill="#c4b5fd"/>
  <text x="600" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="190">:O</text>
  <text x="600" y="620" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" fill="#1f2937">Seu navegador ja parece chefe final de RPG</text>
  <text x="600" y="690" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#1f2937">A estrategia nao e abrir mais abas.</text>
  <text x="600" y="740" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#1f2937">A estrategia e decidir qual missao voce esta fazendo agora.</text>
  <rect x="170" y="870" width="860" height="170" rx="20" fill="#111827"/>
  <text x="600" y="945" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#f9fafb">Moral da historia</text>
  <text x="600" y="1005" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#f9fafb">Favorito e organizacao salvam mais tempo do que coragem aleatoria.</text>
</svg>
