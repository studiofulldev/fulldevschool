<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <rect width="1200" height="1200" fill="#ecfdf5"/>
  <rect x="60" y="60" width="1080" height="1080" rx="28" fill="#f9fffb" stroke="#065f46" stroke-width="8"/>
  <text x="600" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="56" font-weight="700" fill="#111827">Seu primeiro bug serio</text>
  <text x="600" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#374151">parece chefao de fase, mas quase sempre e so uma pista mal lida</text>
  <rect x="170" y="300" width="860" height="420" rx="22" fill="#111827"/>
  <text x="240" y="390" font-family="Courier New, monospace" font-size="34" fill="#f9fafb">Erro: alguma coisa quebrou</text>
  <text x="240" y="455" font-family="Courier New, monospace" font-size="34" fill="#f87171">Stack trace apareceu do nada</text>
  <text x="240" y="520" font-family="Courier New, monospace" font-size="34" fill="#fde68a">Voce: pronto, acabou, deletei a run</text>
  <text x="240" y="585" font-family="Courier New, monospace" font-size="34" fill="#86efac">Realidade: respira, le a mensagem, testa em partes</text>
  <text x="240" y="650" font-family="Courier New, monospace" font-size="34" fill="#93c5fd">Bug vencido com paciencia + log + contexto</text>
  <text x="600" y="840" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" fill="#111827">Nem todo inimigo e boss final.</text>
  <text x="600" y="895" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" fill="#111827">As vezes e so o goblin do ponto e virgula ausente.</text>
  <rect x="190" y="970" width="820" height="90" rx="18" fill="#065f46"/>
  <text x="600" y="1028" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#f9fafb">Quem depura com calma joga no hard mode sem rage quit.</text>
</svg>
