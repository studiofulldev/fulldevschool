name: CI/CD

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate:
    name: Apply migrations
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref gzuymsmkjzkfvstwipal
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Apply Supabase migrations
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: Production
    needs: migrate

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          OUTPUT=$(npx vercel deploy --prod --yes --no-color --token="$VERCEL_TOKEN" 2>&1)
          echo "$OUTPUT"

          DEPLOYMENT_URL=$(echo "$OUTPUT" | grep -Eo 'https://[a-zA-Z0-9_-]+\.vercel\.app' | grep -v "fulldevschool-fulldevstudio" | tail -1)
          DEPLOY_HOSTNAME="${DEPLOYMENT_URL#https://}"
          echo "Deployment hostname: $DEPLOY_HOSTNAME"

          DEPLOYMENT_ID=$(curl -sf \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments?url=$DEPLOY_HOSTNAME&teamId=$VERCEL_ORG_ID&limit=1" \
            | jq -r '.deployments[0].uid')
          echo "Deployment ID: $DEPLOYMENT_ID"

          PROMOTE_RESULT=$(curl -sf -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/promote/$DEPLOYMENT_ID?teamId=$VERCEL_ORG_ID")
          echo "Promote result: $PROMOTE_RESULT"
