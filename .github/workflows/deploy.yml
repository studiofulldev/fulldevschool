name: CI/CD

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  migrate:
    name: Apply migrations
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref gzuymsmkjzkfvstwipal
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Apply Supabase migrations
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: Production
    needs: migrate

    steps:
      - name: Trigger Vercel deploy and wait for completion
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}")
          DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -r '.job.id')

          if [[ -z "$DEPLOYMENT_ID" || "$DEPLOYMENT_ID" == "null" ]]; then
            echo "::error::Falha ao obter deployment ID. Resposta: $RESPONSE"
            exit 1
          fi

          echo "Deployment iniciado: $DEPLOYMENT_ID"

          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(curl -s \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$DEPLOYMENT_ID")

            READY_STATE=$(echo "$STATUS" | jq -r '.readyState')
            echo "[$i/30] Estado: $READY_STATE"

            if [[ "$READY_STATE" == "READY" ]]; then
              URL=$(echo "$STATUS" | jq -r '.url')
              echo "Deploy concluído: https://$URL"
              exit 0
            elif [[ "$READY_STATE" == "ERROR" || "$READY_STATE" == "CANCELED" ]]; then
              echo "::error::Deploy falhou com estado: $READY_STATE"
              exit 1
            fi
          done

          echo "::error::Timeout: deploy não ficou READY em 5 minutos"
          exit 1
