name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fulldev-school/app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: fulldev-school/app

      - name: Run unit tests
        run: npm test -- --no-watch
        working-directory: fulldev-school/app
