server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Assets com hash no nome (gerados pelo Angular build) — cache longo
    location ~* \.[0-9a-f]\{8,\}\.(js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # runtime-config.js nunca deve ser cacheado (é o ponto de injeção de config)
    location = /runtime-config.js {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # SPA routing: qualquer rota não encontrada devolve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
